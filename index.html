<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoGet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:#0a0a0f;
      --surface:#111118;
      --border:#1e1e2e;
      --accent:#6af2a8;
      --accent2:#f2a86a;
      --muted:#44445a;
      --text:#e8e8f0;
      --dim:#888899;
      --danger:#f26a6a;
      --warn:#f2d46a;
      --radius:12px;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'DM Mono', monospace;
      display:flex;
      justify-content:center;
      padding:40px 16px;
    }

    .wrapper { max-width:760px; width:100%; }

    header { text-align:center; margin-bottom:30px; }

    .logo {
      font-family:'Syne';
      font-weight:800;
      font-size:2.8rem;
      background:linear-gradient(135deg,var(--accent),#a0f26a);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      margin-bottom:15px;
    }

    #entries { display:flex; flex-direction:column; gap:8px; }

    .entry-row {
      display:grid;
      grid-template-columns:1fr 160px 30px;
      gap:8px;
    }

    input {
      background:var(--bg);
      border:1px solid var(--border);
      color:var(--text);
      padding:8px;
      border-radius:8px;
    }

    button {
      cursor:pointer;
      border:none;
      border-radius:8px;
      padding:8px 12px;
      font-weight:bold;
    }

    .btn-main {
      background:var(--accent);
      color:black;
    }

    .btn-clear {
      background:transparent;
      border:1px solid var(--border);
      color:var(--muted);
    }

    .q-item {
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      margin-bottom:6px;
    }

    .file-item {
      display:flex;
      justify-content:space-between;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      margin-bottom:6px;
    }
  </style>
</head>

<body>
<div class="wrapper">

<header>
  <div class="logo">VideoGet</div>
</header>

<div class="card">
  <div id="entries"></div>
  <button onclick="addRow()">+ Adicionar</button>
  <button class="btn-main" id="btn-start">▶ Baixar</button>
</div>

<div class="card">
  <h3>Progresso</h3>
  <div id="queue"></div>
</div>

<div class="card">
  <h3>Arquivos</h3>
  <div id="files"></div>
  <button class="btn-clear" onclick="limparTudo()">🧹 Limpar tudo</button>
</div>

</div>

<script>
let queue = []
let poll

function addRow(url='', name='') {
  const row = document.createElement('div')
  row.className = 'entry-row'

  row.innerHTML = `
    <input placeholder="URL" value="${url}">
    <input placeholder="Nome" value="${name}">
    <button onclick="this.parentElement.remove()">✕</button>
  `
  document.getElementById('entries').appendChild(row)
}

addRow(); addRow();

document.getElementById('btn-start').onclick = async () => {

  // 🔥 cria batch no clique
  const resBatch = await fetch('/api/start-batch', { method:'POST' })
  const { batch_id } = await resBatch.json()

  const rows = document.querySelectorAll('.entry-row')

  for (const r of rows) {
    const url = r.children[0].value.trim()
    const name = r.children[1].value.trim()

    if (!url) continue

    const res = await fetch('/api/download', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        url,
        custom_name:name,
        quality:'best',
        batch_id
      })
    })

    const data = await res.json()

    queue.push({
      id:data.download_id,
      url,
      name,
      status:'starting',
      percent:0
    })
  }

  startPolling()
}

function startPolling() {
  clearInterval(poll)

  poll = setInterval(async () => {
    let done = true

    for (const item of queue) {
      if (!item.id || item.status==='done' || item.status==='error') continue

      done = false

      const res = await fetch(`/api/progress/${item.id}`)
      const d = await res.json()

      Object.assign(item, d)
    }

    render()

    if (done) {
      clearInterval(poll)
      loadFiles()
    }

  }, 700)
}

function render() {
  const div = document.getElementById('queue')
  div.innerHTML = ''

  queue.forEach(i => {
    div.innerHTML += `
      <div class="q-item">
        ${i.name || i.url}<br>
        ${i.status} - ${i.percent || 0}%
      </div>
    `
  })
}

async function loadFiles() {
  const res = await fetch('/api/list')
  const files = await res.json()

  const div = document.getElementById('files')
  div.innerHTML = ''

  files.forEach(f => {
    div.innerHTML += `
      <div class="file-item">
        ${f.name}
        <a href="/api/file/${encodeURIComponent(f.name)}">⬇</a>
      </div>
    `
  })
}

async function limparTudo() {
  if (!confirm("Apagar tudo?")) return

  await fetch('/api/clear', { method:'POST' })

  queue = []
  document.getElementById('queue').innerHTML = ''
  loadFiles()
}
</script>

</body>
</html>
